<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>都内映画館スクリーンサイズ検索DB v8 ranking</title>
<style>
:root{
  --bg:#f6f5f1; --card:#fff; --ink:#151515; --muted:#737373; --line:#e7e2da;
  --accent:#111; --accent2:#f0ede6; --official:#e9f8ef; --officialText:#11633a;
  --estimate:#fff3e4; --estimateText:#9a4c00; --ref:#eaf2ff; --refText:#1954a6;
  --huge:#111; --large:#442c09; --mid:#364153; --small:#666;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,"Noto Sans JP",sans-serif;}
header{padding:22px 16px 12px;max-width:1160px;margin:0 auto;}
h1{margin:0 0 8px;font-size:clamp(20px,5.2vw,30px);letter-spacing:-.04em;line-height:1.15;}
.lead{margin:0;color:var(--muted);font-size:13px;line-height:1.6;}
.controls{position:sticky;top:0;z-index:20;background:rgba(246,245,241,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,.55);border-bottom:1px solid var(--line);padding:10px 12px;}
.controls-inner{max-width:1160px;margin:0 auto;display:grid;grid-template-columns:1.5fr .75fr .75fr .75fr .75fr;gap:10px;align-items:center;}
.field{min-width:0} label{display:block;font-size:11px;color:var(--muted);margin:0 0 4px 2px;}
input,select,button{width:100%;min-height:44px;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--ink);font-size:15px;padding:0 12px;outline:none;}
input:focus,select:focus{border-color:#111;box-shadow:0 0 0 3px rgba(0,0,0,.08)}
.mobile-actions{display:none;gap:8px} button{font-weight:700;cursor:pointer;background:#111;color:#fff;border-color:#111}
main{max-width:1160px;margin:0 auto;padding:14px 12px 80px;}
.stats{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 12px;}
.stat{background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 10px;font-size:12px;color:#333;}
.legend{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:0 0 12px;}
.legend-item{background:#fff;border:1px solid var(--line);border-radius:14px;padding:9px 10px;font-size:12px;line-height:1.35;color:#444;}
.legend-item b{display:block;color:#111;margin-bottom:2px}
.table-wrap{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:auto;box-shadow:0 10px 28px rgba(0,0,0,.04)}
table{width:100%;border-collapse:separate;border-spacing:0;min-width:1240px;}
th,td{padding:10px 11px;border-bottom:1px solid var(--line);vertical-align:top;text-align:left;}
th{font-size:12px;color:#404040;background:#fbfaf7;position:sticky;top:0;z-index:1;} tr:hover{background:#fbfaf7}
.num{text-align:right;font-variant-numeric:tabular-nums}.note{max-width:320px;color:#525252;font-size:12px;line-height:1.45}.rank{font-weight:900;font-variant-numeric:tabular-nums}.rank small{font-weight:600;color:#777}
.badge,.size-badge{display:inline-flex;align-items:center;justify-content:center;padding:4px 8px;border-radius:999px;font-size:11px;line-height:1;white-space:nowrap;font-weight:800;}
.badge.est{background:var(--estimate);color:var(--estimateText)}.badge.official{background:var(--official);color:var(--officialText)}.badge.ref{background:var(--ref);color:var(--refText)}
.size-badge{background:#f2f2f2;color:#111}.size-badge.s5{background:#111;color:#fff}.size-badge.s4{background:#fff1cc;color:#442c09}.size-badge.s3{background:#eaf2ff;color:#1954a6}.size-badge.s2{background:#f0ede6;color:#444}.size-badge.s1{background:#f5f5f5;color:#666}.size-badge.s0{background:#eee;color:#777}
a{color:#2563eb;text-decoration:none}.cards{display:none}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px;box-shadow:0 8px 22px rgba(0,0,0,.035);margin-bottom:10px;}
.card-head{display:flex;gap:10px;align-items:flex-start;justify-content:space-between;margin-bottom:10px}.cinema{min-width:0}.cinema b{display:block;font-size:16px;line-height:1.25;letter-spacing:-.02em}.screen{display:block;margin-top:3px;color:var(--muted);font-size:13px}.badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;max-width:45%}
.rank-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}.rank-box{background:#111;color:#fff;border-radius:14px;padding:9px 10px}.rank-box .label{font-size:11px;color:rgba(255,255,255,.65);margin-bottom:2px}.rank-box .value{font-size:20px;font-weight:900;letter-spacing:-.04em;font-variant-numeric:tabular-nums}.rank-box.width{background:#fff;border:1px solid var(--line);color:#111}.rank-box.width .label{color:var(--muted)}
.impression{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px;margin:8px 0;font-size:13px;line-height:1.45}.impression b{display:inline-block;margin-right:6px}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}.metric{background:var(--accent2);border-radius:14px;padding:10px 8px;min-width:0}.metric .label{font-size:11px;color:var(--muted);margin-bottom:3px}.metric .value{font-size:17px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums;}
.subgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.subitem{border:1px solid var(--line);border-radius:14px;padding:9px;font-size:12px}.subitem span{display:block;color:var(--muted);font-size:11px;margin-bottom:3px}.card-note{color:#525252;font-size:12px;line-height:1.5;margin-top:10px}.source-link{display:inline-block;margin-top:10px;font-size:13px;font-weight:700}.empty{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;color:var(--muted)}
.to-top{position:fixed;right:14px;bottom:14px;z-index:30;width:auto;min-height:42px;padding:0 14px;border-radius:999px;box-shadow:0 8px 22px rgba(0,0,0,.15);display:none;}
@media (max-width:760px){
  header{padding:18px 14px 10px}.controls{padding:8px}.controls-inner{grid-template-columns:1fr 1fr;gap:8px}.field.search{grid-column:1/-1}.mobile-actions{display:grid;grid-template-columns:1fr 1fr;grid-column:1/-1}.table-wrap{display:none}.cards{display:block}.legend{grid-template-columns:1fr 1fr}.stat{font-size:11px;padding:6px 8px}.card{padding:12px;border-radius:18px}.metrics{gap:6px}.metric{padding:9px 7px}.metric .value{font-size:15px}.badges{max-width:48%}.to-top{display:block}
}
@media (max-width:390px){.controls-inner{grid-template-columns:1fr}.mobile-actions{grid-template-columns:1fr 1fr}.legend{grid-template-columns:1fr}.badges{max-width:50%}.rank-row{grid-template-columns:1fr 1fr}.rank-box .value{font-size:18px}}
</style>
</head>
<body>
<header>
  <h1>都内映画館スクリーンサイズ検索DB v8</h1>
  <p class="lead">映画館名・スクリーン名で検索できます。面積ランクと横幅ランク、サイズ感の一言コメント付き。公式値・参考値・席数推定が混在します。</p>
</header>
<section class="controls">
  <div class="controls-inner">
    <div class="field search"><label for="q">検索</label><input id="q" placeholder="例：渋谷 / 板橋 / 多摩センター / TOHO / バルト9" autocomplete="off"></div>
    <div class="field"><label for="sort">並び替え</label><select id="sort"><option value="area">面積ランク順</option><option value="width">横幅ランク順</option><option value="height">高さ順</option><option value="seats">座席数順</option><option value="name">映画館名順</option></select></div>
    <div class="field"><label for="kind">データ種別</label><select id="kind"><option value="all">全データ</option><option value="official">公式・参考のみ</option><option value="estimate">席数推定のみ</option></select></div>
    <div class="field"><label for="minw">横幅</label><select id="minw"><option value="0">指定なし</option><option value="10">10m以上</option><option value="12">12m以上</option><option value="15">15m以上</option><option value="20">20m以上</option></select></div>
    <div class="field"><label for="sizeFilter">サイズ感</label><select id="sizeFilter"><option value="all">すべて</option><option value="超巨大">超巨大</option><option value="巨大">巨大</option><option value="かなり大きい">かなり大きい</option><option value="大きめ">大きめ</option><option value="中程度">中程度</option><option value="やや小さめ">やや小さめ</option><option value="小さい">小さい</option></select></div>
    <div class="mobile-actions"><button id="clearBtn" type="button">クリア</button><button id="topBtn2" type="button">上へ</button></div>
  </div>
</section>
<main>
  <div class="legend">
    <div class="legend-item"><b>面積ランク</b>スクリーン全体の大きさ。迫力重視。</div>
    <div class="legend-item"><b>横幅ランク</b>シネスコ映画のワイド感に効きます。</div>
    <div class="legend-item"><b>サイズ感</b>面積からざっくり分類。</div>
    <div class="legend-item"><b>席数推定</b>公式サイズ非掲載のため目安です。</div>
  </div>
  <div class="stats" id="stats"></div>
  <section class="cards" id="cards"></section>
  <div class="table-wrap">
    <table>
      <thead><tr><th>面積<br>ランク</th><th>横幅<br>ランク</th><th>サイズ感</th><th>映画館</th><th>スクリーン</th><th class="num">横幅m</th><th class="num">高さm</th><th class="num">面積㎡</th><th class="num">座席数</th><th>種別</th><th>一言</th><th>備考</th><th>出典</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>
<button id="toTop" class="to-top" type="button">上へ</button>

function competitionRanks(rows,key){
  const vals=[...new Set(rows.map(r=>Number(r[key])||0))].sort((a,b)=>b-a);
  const map=new Map();
  vals.forEach(v=>{ map.set(v, rows.filter(r=>(Number(r[key])||0)>v).length + 1); });
  return map;
}
function sizeInfo(area,width){
  area=Number(area)||0; width=Number(width)||0;
  let label, level, comment;
  if(area>=180){label='超巨大'; level='s5'; comment='都内トップ級。大画面体験狙いなら最優先。';}
  else if(area>=120){label='巨大'; level='s4'; comment='大型館としてかなり満足感が出やすいサイズ。';}
  else if(area>=80){label='かなり大きい'; level='s3'; comment='一般的なシネコンではかなり大きめ。';}
  else if(area>=60){label='大きめ'; level='s3'; comment='中大型。大きいスクリーン感は十分。';}
  else if(area>=40){label='中程度'; level='s2'; comment='標準的。大画面狙いなら上位館も検討。';}
  else if(area>=25){label='やや小さめ'; level='s1'; comment='コンパクト寄り。近さ重視ならあり。';}
  else {label='小さい'; level='s0'; comment='小箱。スクリーンサイズ重視なら優先度は低め。';}
  const wide = width>=20 ? '横幅も超ワイド。' : width>=15 ? '横幅がかなり広くシネスコ向き。' : width>=12 ? '横幅は広め。' : width>=10 ? '横幅は標準〜やや広め。' : '横幅はコンパクト。';
  return {label, level, comment: comment + ' ' + wide};
}
const areaRankMap=competitionRanks(DATA,'面積㎡');
const widthRankMap=competitionRanks(DATA,'横幅m');
DATA.forEach(r=>{
  r['面積ランク']=areaRankMap.get(Number(r['面積㎡'])||0);
  r['横幅ランク']=widthRankMap.get(Number(r['横幅m'])||0);
  const si=sizeInfo(r['面積㎡'],r['横幅m']);
  r['サイズ感']=si.label; r['サイズレベル']=si.level; r['サイズ一言']=si.comment;
});

const q=document.getElementById('q'); const sort=document.getElementById('sort'); const kind=document.getElementById('kind'); const minw=document.getElementById('minw'); const sizeFilter=document.getElementById('sizeFilter');
const tbody=document.getElementById('tbody'); const cards=document.getElementById('cards'); const stats=document.getElementById('stats'); const clearBtn=document.getElementById('clearBtn'); const toTop=document.getElementById('toTop'); const topBtn2=document.getElementById('topBtn2');
function esc(s){return (s??'').toString().replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function n(v,d=1){const num=Number(v); return Number.isFinite(num)?num.toFixed(d):'-';}
function badge(t){let cls=t.includes('推定')?'est':(t.includes('公式')?'official':'ref'); return '<span class="badge '+cls+'">'+esc(t)+'</span>';}
function sizeBadge(r){return '<span class="size-badge '+esc(r['サイズレベル'])+'">'+esc(r['サイズ感'])+'</span>';}
function filtered(){
  const term=q.value.trim().toLowerCase(); const k=kind.value; const mw=parseFloat(minw.value||0); const sf=sizeFilter.value;
  let arr=DATA.filter(r=>{
    const text=(r['映画館名']+' '+r['スクリーン']+' '+r['チェーン']+' '+r['備考']+' '+r['サイズ感']).toLowerCase();
    if(term && !text.includes(term)) return false;
    if(k==='official' && r['データ種別'].includes('推定')) return false;
    if(k==='estimate' && !r['データ種別'].includes('推定')) return false;
    if((Number(r['横幅m'])||0)<mw) return false;
    if(sf!=='all' && r['サイズ感']!==sf) return false;
    return true;
  });
  const s=sort.value;
  arr.sort((a,b)=>{
    if(s==='area') return (Number(a['面積ランク'])||9999)-(Number(b['面積ランク'])||9999) || (Number(b['面積㎡'])||0)-(Number(a['面積㎡'])||0);
    if(s==='width') return (Number(a['横幅ランク'])||9999)-(Number(b['横幅ランク'])||9999) || (Number(b['横幅m'])||0)-(Number(a['横幅m'])||0);
    if(s==='height') return (Number(b['高さm'])||0)-(Number(a['高さm'])||0);
    if(s==='seats') return (Number(b['座席数_num'])||0)-(Number(a['座席数_num'])||0);
    return (a['映画館名']+a['スクリーン']).localeCompare(b['映画館名']+b['スクリーン'],'ja');
  });
  return arr;
}
function render(){
  const arr=filtered(); const official=arr.filter(r=>!r['データ種別'].includes('推定')).length; const est=arr.length-official; const top=arr[0];
  stats.innerHTML='<span class="stat">表示：'+arr.length+'件</span><span class="stat">公式/参考：'+official+'件</span><span class="stat">席数推定：'+est+'件</span>'+(top?'<span class="stat">先頭：#'+top['面積ランク']+' '+esc(top['映画館名'])+' '+esc(top['スクリーン'])+'</span>':'');
  if(!arr.length){tbody.innerHTML='<tr><td colspan="13">該当なし</td></tr>'; cards.innerHTML='<div class="empty">該当するスクリーンがありません。検索語を短くするか、フィルターを外してください。</div>'; return;}
  tbody.innerHTML=arr.map(r=>'<tr>'+
    '<td class="rank">#'+esc(r['面積ランク'])+'<br><small>面積</small></td>'+
    '<td class="rank">#'+esc(r['横幅ランク'])+'<br><small>横幅</small></td>'+
    '<td>'+sizeBadge(r)+'</td>'+
    '<td><b>'+esc(r['映画館名'])+'</b><br><span style="color:#737373;font-size:12px">'+esc(r['チェーン'])+'</span></td>'+
    '<td>'+esc(r['スクリーン'])+'</td>'+
    '<td class="num">'+n(r['横幅m'])+'</td>'+
    '<td class="num">'+n(r['高さm'])+'</td>'+
    '<td class="num"><b>'+n(r['面積㎡'],2)+'</b></td>'+
    '<td class="num">'+esc(r['座席数'])+'</td>'+
    '<td>'+badge(r['データ種別'])+'</td>'+
    '<td class="note"><b>'+esc(r['サイズ感'])+'</b>：'+esc(r['サイズ一言'])+'</td>'+
    '<td class="note">'+esc(r['備考'])+'</td>'+
    '<td><a href="'+esc(r['出典URL'])+'" target="_blank" rel="noopener">出典</a></td>'+
  '</tr>').join('');
  cards.innerHTML=arr.map(r=>'<article class="card">'+
    '<div class="card-head"><div class="cinema"><b>'+esc(r['映画館名'])+'</b><span class="screen">'+esc(r['スクリーン'])+' / '+esc(r['チェーン'])+'</span></div><div class="badges">'+sizeBadge(r)+badge(r['データ種別'])+'</div></div>'+
    '<div class="rank-row"><div class="rank-box"><div class="label">面積ランク</div><div class="value">#'+esc(r['面積ランク'])+'</div></div><div class="rank-box width"><div class="label">横幅ランク</div><div class="value">#'+esc(r['横幅ランク'])+'</div></div></div>'+
    '<div class="impression"><b>'+esc(r['サイズ感'])+'</b>'+esc(r['サイズ一言'])+'</div>'+
    '<div class="metrics"><div class="metric"><div class="label">面積</div><div class="value">'+n(r['面積㎡'],2)+'㎡</div></div><div class="metric"><div class="label">横幅</div><div class="value">'+n(r['横幅m'])+'m</div></div><div class="metric"><div class="label">高さ</div><div class="value">'+n(r['高さm'])+'m</div></div></div>'+
    '<div class="subgrid"><div class="subitem"><span>座席数</span>'+esc(r['座席数'])+'</div><div class="subitem"><span>現在の並び順</span>'+esc(sort.options[sort.selectedIndex].text)+'</div></div>'+
    '<div class="card-note">'+esc(r['備考'])+'</div><a class="source-link" href="'+esc(r['出典URL'])+'" target="_blank" rel="noopener">出典を見る</a>'+
  '</article>').join('');
}
function clearSearch(){q.value=''; kind.value='all'; minw.value='0'; sizeFilter.value='all'; render(); q.focus();}
function scrollTopNow(){window.scrollTo({top:0,behavior:'smooth'});} 
[q,sort,kind,minw,sizeFilter].forEach(el=>{el.addEventListener('input',render);el.addEventListener('change',render);el.addEventListener('keyup',render);});
clearBtn.addEventListener('click',clearSearch); toTop.addEventListener('click',scrollTopNow); topBtn2.addEventListener('click',scrollTopNow); window.addEventListener('scroll',()=>{toTop.style.display=window.scrollY>400?'block':'';});
render();
</script>
</body>
</html>
